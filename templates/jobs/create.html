{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm p-4 col-md-8 mx-auto">
    <h3 class="mb-3">Add Job Application</h3>
    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label font-weight-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">
                        {% for error in field.errors %}
                            <p class="mb-0">{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success">Save Application</button>
        <a href="{% url 'job_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
