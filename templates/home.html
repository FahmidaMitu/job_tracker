{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Home Dashboard</h2>

<div class="row g-3">
    <div class="col-md-4">
        <div class="card text-white bg-primary p-3">
            <h5>Total Applications</h5>
            <h2>{{ total_apps }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-info p-3">
            <h5>Applied</h5>
            <h2>{{ applied }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-warning p-3">
            <h5>Interview</h5>
            <h2>{{ interview }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-secondary p-3">
            <h5>Offer</h5>
            <h2>{{ offer }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success p-3">
            <h5>Accepted</h5>
            <h2>{{ accepted }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-danger p-3">
            <h5>Rejected</h5>
            <h2>{{ rejected }}</h2>
        </div>
    </div>
</div>
{% endblock %}
